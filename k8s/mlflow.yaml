apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-deployment
  namespace: empl-attr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow

  template:
    metadata:
      labels:
        app: mlflow

    spec:
      volumes:
      - name: mlflow-data
        hostPath:
          path: /mnt/storage/mlflow
          type: DirectoryOrCreate

      containers:
        - name: mlflow
          image: mlflow_image:0.2
          imagePullPolicy: Never
          ports:
            - containerPort: 5000

          volumeMounts:
            - mountPath: /mlflow
              name: mlflow-data
              readOnly: false

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: empl-attr

spec:
  selector:
    app: mlflow

  ports:
    - port: 5000
      targetPort: 5000

  type: ClusterIP